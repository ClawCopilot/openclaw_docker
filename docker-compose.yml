services:
  # 网关 1 - serv
  serv:
    build: .
    container_name: serv
    ports:
      - "42700:18798"
    volumes:
      - ./serv/.openclaw:/root/.openclaw          # Config and data
      - ./serv/workspace:/root/workspace          # Agent workspace
    environment:
      - GATEWAY_ID=serv
      - PORT=18798
      - NODE_ENV=production
      - npm_config_registry=https://registry.npmmirror.com/
      - pnpm_config_registry=https://registry.npmmirror.com/
      - TZ=Asia/Shanghai     # Set your timezone
    restart: unless-stopped
    mem_limit: 2g            # Prevent runaway memory usage
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18798/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    privileged: true

