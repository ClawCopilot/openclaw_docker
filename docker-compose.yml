# 公共配置锚点
x-base-service:
  &base-service
  build:
    context: .
    args:
      - BASE_IMAGE=${BASE_IMAGE:-ghcr.m.daocloud.io/openclaw/openclaw:latest}
      - CONTAINER_HOME=${CONTAINER_HOME:-/home/node}
      - TZ=${TZ:-Asia/Shanghai}
      - PIP_MIRROR=${PIP_MIRROR:-tuna}
      - RUST_VERSION=${RUST_VERSION:-stable}
      - RUSTUP_MIRROR=${RUSTUP_MIRROR:-tuna}
      - RUST_CRATES_MIRROR=${RUST_CRATES_MIRROR:-tuna}
      - GO_VERSION=${GO_VERSION:-1.25.8}
      - GOPROXY_MIRRORS=${GOPROXY_MIRRORS:-goproxy.cn,goproxy.io,direct}
      - DOCKER_HUB_MIRRORS=${DOCKER_HUB_MIRRORS:-daocloud,aliyun,tuna}
      - OPENCLAW_VERSION=${OPENCLAW_VERSION:-latest}
      - INSTALL_DOCKER=${INSTALL_DOCKER:-false}
      - INSTALL_PODMAN=${INSTALL_PODMAN:-true}
      - INSTALL_DOCKER_COMPOSE=${INSTALL_DOCKER_COMPOSE:-false}
      - DOCKER_COMPOSE_VERSION=${DOCKER_COMPOSE_VERSION:-latest}
  environment:
    - PORT=18789
    - NODE_ENV=${OPENCLAW_NODE_ENV:-production}
    - npm_config_registry=${npm_config_registry:-https://registry.npmmirror.com/}
    - pnpm_config_registry=${pnpm_config_registry:-https://registry.npmmirror.com/}
    - TZ=${TZ:-Asia/Shanghai}
    - OPENCLAW_VERSION=${OPENCLAW_VERSION:-latest}
  restart: ${CONTAINER_RESTART_POLICY:-unless-stopped}
  logging:
    driver: json-file
    options:
      max-size: "${LOG_MAX_SIZE:-10m}"
      max-file: "${LOG_MAX_FILE:-3}"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
    interval: ${HEALTHCHECK_INTERVAL:-30s}
    timeout: ${HEALTHCHECK_TIMEOUT:-10s}
    start_period: ${HEALTHCHECK_START_PERIOD:-5s}
    retries: ${HEALTHCHECK_RETRIES:-3}
  privileged: true
  network_mode: ${NETWORK_MODE:-bridge}

# 服务配置
services:
  # 网关 1 - sme1
  sme1:
    <<: *base-service
    container_name: sme1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 8g
    volumes:
      - ./sme1/supervisor/conf.d:/etc/supervisor/conf.d     # Supervisor config
      - ./sme1/.ssh:/home/node/.ssh:U,z                    # Config ssh
      - ./sme1/.openclaw:/home/node/.openclaw:U,z          # Config and data
      - ./sme1/workspace:/home/node/workspace:U,z          # Agent workspace
      - ./sme1/apps:/home/node/apps:U,z                    # Config apps
      - ./share:/home/node/share:U,z                              # Config share
    environment:
      - GATEWAY_ID=sme1

  # 网关 2 - sme2
  sme2:
    <<: *base-service
    container_name: sme2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 8g
    volumes:
      - ./sme2/supervisor/conf.d:/etc/supervisor/conf.d     # Supervisor config
      - ./sme2/.ssh:/home/node/.ssh:U,z                    # Config ssh
      - ./sme2/.openclaw:/home/node/.openclaw:U,z          # Config and data
      - ./sme2/workspace:/home/node/workspace:U,z          # Agent workspace
      - ./sme2/apps:/home/node/apps:U,z                    # Config apps
      - ./share:/home/node/share:U,z                              # Config share
    environment:
      - GATEWAY_ID=sme2

  # 网关 3 - serv
  serv:
    <<: *base-service
    container_name: serv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 8g
    volumes:
      - ./serv/supervisor/conf.d:/etc/supervisor/conf.d     # Supervisor config
      - ./serv/.ssh:/home/node/.ssh:U,z                    # Config ssh
      - ./serv/.openclaw:/home/node/.openclaw:U,z          # Config and data
      - ./serv/workspace:/home/node/workspace:U,z          # Agent workspace
      - ./serv/apps:/home/node/apps:U,z                    # Config apps
      - ./share:/home/node/share:U,z                              # Config share
    environment:
      - GATEWAY_ID=serv

